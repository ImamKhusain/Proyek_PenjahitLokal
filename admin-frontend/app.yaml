runtime: nodejs22

service: admin-frontend

automatic_scaling:
  max_instances: 2

handlers:
  - url: /(.*\..+)$
    static_files: dist/\1
    upload: dist/(.*\..+)$

    http_headers:
      Cache-Control: "no-cache"

  - url: /.*
    static_files: dist/index.html
    upload: dist/index.html

    http_headers:
      Cache-Control: "no-cache"